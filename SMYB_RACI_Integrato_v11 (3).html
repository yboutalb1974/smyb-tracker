<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMYB — RACI Workbook</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --nv:#0D1B2A;--bl:#1B4F72;--ac:#2E86C1;
  --g:#1D9E75;--gl:#D1FAE5;--gd:#065F46;
  --a:#D97706;--al:#FEF3C7;--ad:#78350F;
  --r:#DC2626;--rl:#FEE2E2;--rd:#7F1D1D;
  --pu:#7C3AED;--pul:#EDE9FE;--pud:#3B0764;
  --or:#EA580C;--orl:#FFEDD5;
  --s1:#F8FAFC;--s2:#F1F5F9;--s3:#E2E8F0;--s4:#CBD5E1;
  --dk:#0F172A;--md:#475569;--lt:#94A3B8;--wh:#FFFFFF;
  --font:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --rad:6px;--rad-lg:10px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--s1);color:var(--dk);font-size:13px;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .2s ease}

/* SIDEBAR LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:200px;min-width:200px;background:var(--nv);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.06);flex-shrink:0}
#main-content{flex:1;overflow-y:auto;background:var(--s1)}

.nav-brand{padding:16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px;flex-shrink:0}
.nav-logo{width:28px;height:28px;background:var(--ac);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo svg{width:13px;height:13px}
.nav-title{font-size:13px;font-weight:600;color:#fff;line-height:1.2}
.nav-sub{font-size:9px;color:rgba(255,255,255,.35);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}

#tabs{flex:1;overflow-y:auto;padding:6px 0}
.tab{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:11px;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;border-left:3px solid transparent;transition:all .12s;white-space:nowrap}
.tab:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.tab.on{color:#fff;border-left-color:var(--ac);background:rgba(46,134,193,.15)}
.tab-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center}

/* PAGE */
#page{max-width:1300px;margin:0 auto;padding:20px}

/* SECTION HEADER */
.sec-hdr{background:var(--nv);border-radius:var(--rad-lg);padding:18px 22px;margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between}
.sec-title{font-size:18px;font-weight:600;color:#fff;letter-spacing:-.3px}
.sec-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px;font-family:var(--mono)}

/* CARDS GRID */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--wh);border-radius:var(--rad-lg);padding:14px 16px;border:1px solid var(--s3);box-shadow:var(--sh)}
.card-v{font-size:26px;font-weight:600;font-family:var(--mono);line-height:1}
.card-l{font-size:10px;color:var(--lt);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* TABLE */
.tbl-wrap{background:var(--wh);border-radius:var(--rad-lg);border:1px solid var(--s3);overflow:auto;box-shadow:var(--sh);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--nv)}
thead th{padding:9px 11px;text-align:left;font-size:10px;font-weight:600;color:rgba(255,255,255,.7);white-space:nowrap;font-family:var(--mono);text-transform:uppercase;letter-spacing:.4px}
tbody tr:nth-child(even){background:var(--s2)}
tbody tr:hover{background:#EBF5FB}
tbody td{padding:8px 11px;border-top:1px solid var(--s3);vertical-align:middle}
.area-cell{font-weight:600;color:var(--nv);font-size:11px}
.proc-cell{color:var(--dk)}

/* RACI PILLS */
.rp{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:10px;font-weight:700;font-family:var(--mono)}
.rp-R{background:#D1FAE5;color:#065F46}
.rp-A{background:#D6EAF8;color:#1B4F72}
.rp-C{background:#FEF3C7;color:#78350F}
.rp-I{background:#EDE9FE;color:#3B0764}
.rp-empty{background:transparent;color:transparent}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono);white-space:nowrap}

/* WORKLOAD BAR */
.wl-bar{height:8px;border-radius:4px;background:var(--s3);overflow:hidden;margin-top:4px}
.wl-fill{height:100%;border-radius:4px;transition:width .3s}

/* ALERT BADGE */
.alert-dec{background:#FFE0E0;color:#7F1D1D}
.alert-warn{background:#FFEDD5;color:#7C2D12}
.alert-ok{background:#D1FAE5;color:#065F46}
.alert-info{background:#EDE9FE;color:#3B0764}
.alert-none{background:#F1F5F9;color:#64748B}

/* INDEX */
.index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.idx-card{background:var(--wh);border-radius:var(--rad-lg);padding:16px;border:1px solid var(--s3);box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.idx-card:hover{border-color:var(--ac);box-shadow:0 4px 16px rgba(46,134,193,.15);transform:translateY(-1px)}
.idx-num{font-size:11px;font-family:var(--mono);color:var(--lt);margin-bottom:4px}
.idx-icon{font-size:20px;margin-bottom:6px}
.idx-title{font-size:14px;font-weight:600;color:var(--dk);margin-bottom:4px}
.idx-desc{font-size:11px;color:var(--lt);line-height:1.5}

/* SC MATRIX area header */
.area-hdr{background:var(--nv);color:#fff;padding:8px 11px;font-size:11px;font-weight:600;font-family:var(--mono);letter-spacing:.3px}

/* SCHEDA CARD */
.scheda-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.scheda-card{background:var(--wh);border-radius:var(--rad-lg);border:1px solid var(--s3);overflow:hidden;box-shadow:var(--sh)}
.scheda-hdr{background:var(--bl);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.scheda-name{font-size:13px;font-weight:600;color:#fff}
.scheda-ruolo{font-size:10px;color:rgba(255,255,255,.55)}
.scheda-body{padding:12px 14px}
.scheda-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--s2);font-size:11px}
.scheda-row:last-child{border:none}
.scheda-lbl{color:var(--lt);font-weight:500}
.scheda-val{color:var(--dk);text-align:right;max-width:60%}

/* KPI TABLE */
.kpi-obj{font-size:10px;color:var(--md);background:var(--s2);padding:2px 6px;border-radius:3px;margin-bottom:2px;display:block}
.kpi-metric{font-size:11px;font-weight:600;color:var(--gd);font-family:var(--mono)}

/* GUIDA */
.guida-card{background:var(--wh);border-radius:var(--rad-lg);border:1px solid var(--s3);padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
.guida-tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--mono);margin-bottom:8px}
.guida-title{font-size:15px;font-weight:600;color:var(--dk);margin-bottom:4px}
.guida-desc{font-size:12px;color:var(--md);line-height:1.6}
.guida-rule{font-size:11px;color:var(--ac);font-style:italic;margin-top:6px}

/* LEGEND */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fchip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;background:var(--s2);color:var(--md);border:1px solid var(--s3);transition:all .15s}
.fchip.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.fchip:hover:not(.on){background:var(--s3)}

@media(max-width:768px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .scheda-grid{grid-template-columns:1fr}
  #page{padding:12px}
  #sidebar{width:160px;min-width:160px}
  .tab{padding:8px 10px;font-size:10px}
}
</style>

// ── UTILS ─────────────────────────────────────────────────────────────────────
function rp(v) {
  if(!v) return '<span class="rp rp-empty">·</span>';
  return `<span class="rp rp-${v}">${v}</span>`;
}
function badge(txt, cls) {
  return `<span class="badge ${cls}">${txt}</span>`;
}
function ini(name) {
  return name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}
var avColors = ['#2E86C1','#1D9E75','#D97706','#7C3AED','#EA580C','#DC2626'];
function avColor(name) {
  var h=0; for(var i=0;i<name.length;i++) h=(h<<5)-h+name.charCodeAt(i)|0;
  return avColors[Math.abs(h)%avColors.length];
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = DATA.tabs.map(t =>
    `<div class="tab ${t.id===activeTab?'on':''}" onclick="switchTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>${t.label}
    </div>`
  ).join('');
}

function switchTab(id) {
  activeTab = id;
  areaFilter = 'tutti';
  buildTabs();
  renderPage();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderPage() {
  var el = document.getElementById('page');
  el.className = 'fade';
  var html = '';
  switch(activeTab) {
    case 'indice':   html = renderIndice();   break;
    case 'analisi':  html = renderAnalisi();  break;
    case 'diagram':  html = renderDiagram();  break;
    case 'workload': html = renderWorkload(); break;
    case 'schede':   html = renderSchede();   break;
    case 'decision': html = renderDecision(); break;
    case 'kpi':      html = renderKPI();      break;
    case 'sc_matrix':html = renderSCMatrix(); break;
    case 'sc_guida': html = renderSCGuida();  break;
    case 'sc_dash':  html = renderSCDash();   break;
  }
  el.innerHTML = html;
  // re-trigger animation
  void el.offsetWidth;
  el.className = 'fade';
}

// ── RACI DIAGRAM ─────────────────────────────────────────────────────────────
function renderDiagram() {
  var areas = [...new Set(DATA.raci_matrix.map(r=>r.area))];

  var filterBar = `<div class="filter-bar">
    <div class="fchip ${areaFilter==='tutti'?'on':''}" onclick="setArea('tutti',this)">Tutte le aree</div>
    ${areas.map(a => `<div class="fchip ${areaFilter===a?'on':''}" onclick="setArea('${a}',this)">${a}</div>`).join('')}
  </div>`;

  var filtered = areaFilter==='tutti' ? DATA.raci_matrix : DATA.raci_matrix.filter(r=>r.area===areaFilter);

  var roleHeaders = DATA.raci_roles.map(r =>
    `<th style="writing-mode:vertical-rl;transform:rotate(180deg);padding:8px 4px;font-size:9px;max-height:100px;min-width:28px;white-space:nowrap">${r}</th>`
  ).join('');

  var rows = filtered.map(r => {
    var cells = r.vals.map(v => `<td style="text-align:center;padding:4px">${rp(v)}</td>`).join('');
    return `<tr>
      <td class="area-cell" style="font-size:10px;white-space:nowrap;padding:6px 10px">${r.area}</td>
      <td class="proc-cell" style="white-space:nowrap;padding:6px 10px;min-width:200px">${r.proc}</td>
      ${cells}
    </tr>`;
  }).join('');

  return `
  <div class="sec-hdr">
    <div><div class="sec-title">RACI Diagram — Matrice Attività × Ruoli</div>
    <div class="sec-sub">23 processi × 27 ruoli — filtra per area operativa</div></div>
  </div>
  <div class="legend">
    <div class="leg"><span class="rp rp-R">R</span> Responsible — chi esegue</div>
    <div class="leg"><span class="rp rp-A">A</span> Accountable — chi decide</div>
    <div class="leg"><span class="rp rp-C">C</span> Consulted — chi consulta</div>
    <div class="leg"><span class="rp rp-I">I</span> Informed — chi è informato</div>
  </div>
  ${filterBar}
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Area</th><th>Processo</th>${roleHeaders}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function setArea(a, el) {
  areaFilter = a;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  // Re-render just the table part
  renderPage();
}

      <div class="scheda-body">

// ── DECISION RIGHTS ───────────────────────────────────────────────────────────
function renderDecision() {

    <tr>
      <td style="font-weight:600;color:var(--nv)">${d.area}</td>

      <td style="font-size:11px;color:var(--md)">${d.consulta}</td>
      <td style="text-align:center">${badge(d.esc, escColors[d.esc]||'alert-ok')}</td>
      <td style="font-size:11px;color:var(--lt);font-style:italic">${d.nota}</td>

  return `
  <div class="sec-hdr">
    <div><div class="sec-title">Decision Rights & Anti-Scavalco</div>

}

// ── SC MATRIX ────────────────────────────────────────────────────────────────
function renderSCMatrix() {
  var roleHeaders = DATA.sc_roles.map(r =>
    `<th style="writing-mode:vertical-rl;transform:rotate(180deg);padding:8px 4px;font-size:9px;min-width:26px;white-space:nowrap">${r}</th>`
  ).join('');

  var rows = DATA.sc_matrix.map(area => {
    var hdr = `<tr><td colspan="${DATA.sc_roles.length+2}" class="area-hdr">${area.area}</td></tr>`;
    var procRows = area.procs.map(p => {
      var cells = DATA.sc_roles.map((r,i) => `<td style="text-align:center;padding:4px">${rp(p.vals[i]||'')}</td>`).join('');
      return `<tr><td colspan="1"></td><td style="padding:6px 10px;font-size:11px">${p.name}</td>${cells}</tr>`;
    }).join('');
    return hdr + procRows;
  }).join('');

  return `
  <div class="sec-hdr">
    <div><div class="sec-title">SC · RACI Matrix — Operazioni & Supply Chain</div>
    <div class="sec-sub">35 processi × 14 ruoli — 8 aree operative</div></div>
  </div>
  <div class="legend">
    <div class="leg"><span class="rp rp-R">R</span> Responsible</div>
    <div class="leg"><span class="rp rp-A">A</span> Accountable</div>
    <div class="leg"><span class="rp rp-C">C</span> Consulted</div>
    <div class="leg"><span class="rp rp-I">I</span> Informed</div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th></th><th>Processo</th>${roleHeaders}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── SC GUIDA ─────────────────────────────────────────────────────────────────
function renderSCGuida() {
  var ruoli = [
    {tag:'R', tagCls:'alert-ok', title:'R – Responsible', desc:'Chi esegue materialmente il lavoro o il task.', rule:'Può essere più di uno per processo. Risponde ad A.'},
    {tag:'A', tagCls:'alert-info', title:'A – Accountable', desc:'Chi è l\'unico responsabile finale del risultato. Firma e approva.', rule:'Solo UNO per ogni riga. Ha autorità decisionale.'},
    {tag:'C', tagCls:'alert-warn', title:'C – Consulted', desc:'Chi fornisce input, pareri o competenze prima della decisione.', rule:'Comunicazione bidirezionale. Rallenta se abusato.'},
    {tag:'I', tagCls:'alert-dec', title:'I – Informed', desc:'Chi deve essere aggiornato sul progresso/risultati.', rule:'Comunicazione unidirezionale. Solo dopo decisioni chiave.'},
  ];
  var best = [
    {title:'Una sola A per riga', desc:'Ogni processo deve avere esattamente un Accountable.', rule:'Evita ambiguità decisionali.'},
    {title:'Minimizza le C', desc:'Troppe consulenze rallentano i processi.', rule:'Mantieni max 3 C per riga.'},
    {title:'Aggiorna periodicamente', desc:'Rivedere la matrice ogni 6 mesi o dopo riorganizzazioni.', rule:'Coinvolgi i team lead nella revisione.'},
    {title:'Distingui R da A', desc:'L\'Accountable non deve necessariamente eseguire.', rule:'Separare responsabilità esecutiva da quella decisionale.'},
  ];

  return `
  <div class="sec-hdr">
    <div><div class="sec-title">SC · Guida all'utilizzo del Modello RACI</div>
    <div class="sec-sub">Regole, ruoli e best practice per l'applicazione corretta</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-bottom:16px">
    ${ruoli.map(r => `
    <div class="guida-card">
      <div><span class="badge ${r.tagCls} guida-tag">${r.tag}</span></div>
      <div class="guida-title">${r.title}</div>
      <div class="guida-desc">${r.desc}</div>
      <div class="guida-rule">→ ${r.rule}</div>
    </div>`).join('')}
  </div>
  <div class="sec-hdr" style="margin-bottom:12px">
    <div><div class="sec-title" style="font-size:14px">Best Practice</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">
    ${best.map(b => `
    <div class="guida-card">
      <div class="guida-title">✓ ${b.title}</div>
      <div class="guida-desc">${b.desc}</div>
      <div class="guida-rule">→ ${b.rule}</div>
    </div>`).join('')}
  </div>`;
}
